<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects | Divin Balethota</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- Navbar -->
<nav class="flex justify-between items-center px-8 py-4 bg-gray-900 shadow-lg">
  <h1 class="text-2xl font-bold text-yellow-400">Divin Balethota</h1>
  <a href="index.html" 
     class="bg-yellow-400 text-black px-4 py-2 rounded-full font-semibold hover:bg-yellow-300 transition">
     Back to Home
  </a>
</nav>

<!-- Title -->
<div class="text-center py-16">
  <h2 class="text-4xl md:text-5xl font-bold">
    My <span class="text-yellow-400">Projects</span>
  </h2>
  <div class="w-24 h-1 bg-yellow-400 mx-auto mt-4 rounded-full"></div>
</div>

<!-- Projects -->
<section class="px-6 md:px-20 pb-20">

  <div class="grid md:grid-cols-2 gap-10">

    <!-- Project 1 -->
    <div class="bg-gray-900 rounded-2xl overflow-hidden shadow-xl hover:scale-105 transition duration-500">
      <img src="aioshopy.png" alt="AiO Shopy" class="w-full h-56 object-cover">
      <div class="p-6 text-center">
        <h3 class="text-xl font-semibold text-yellow-400 mb-4">
          AiO Shopy – E-Commerce Website
        </h3>
        <a href="https://aio-shopy-ecommerce-website.vercel.app" target="_blank"
           class="bg-yellow-400 text-black px-6 py-2 rounded-full font-semibold hover:bg-yellow-300 transition">
           Live Demo
        </a>
      </div>
    </div>

    <!-- Project 2 -->
    <div class="bg-gray-900 rounded-2xl overflow-hidden shadow-xl hover:scale-105 transition duration-500">
      <img src="foodhunt.png" alt="FoodHunt" class="w-full h-56 object-cover">
      <div class="p-6 text-center">
        <h3 class="text-xl font-semibold text-yellow-400 mb-4">
          FoodHunt – Restaurant Platform
        </h3>
        <a href="https://food-hunt-website.vercel.app" target="_blank"
           class="bg-yellow-400 text-black px-6 py-2 rounded-full font-semibold hover:bg-yellow-300 transition">
           Live Demo
        </a>
      </div>
    </div>

    <!-- Hidden Projects -->
    <div id="moreProjects" class="hidden contents">

      <!-- Project 3 -->
      <div class="bg-gray-900 rounded-2xl overflow-hidden shadow-xl hover:scale-105 transition duration-500">
        <img src="ecart.png" alt="Laptop Prediction" class="w-full h-56 object-cover">
        <div class="p-6 text-center">
          <h3 class="text-xl font-semibold text-yellow-400 mb-4">
            ECART
          </h3>
          <a href="https://ecart-ldah.onrender.com" target="_blank"
             class="bg-yellow-400 text-black px-6 py-2 rounded-full font-semibold hover:bg-yellow-300 transition">
             Live Demo
          </a>
        </div>
      </div>

    </div>

  </div>

  <!-- See More Button -->
  <div class="text-center mt-12">
    <button onclick="showMore()" id="seeMoreBtn"
      class="border border-yellow-400 px-6 py-2 rounded-full font-semibold hover:bg-yellow-400 hover:text-black transition">
      See More
    </button>
  </div>

</section>

<!-- Footer -->
<footer class="text-center py-6 bg-gray-900 border-t border-gray-800">
  <p class="text-gray-400">
    © 2026 Divin Balethota | MERN Stack Developer
  </p>
</footer>

<!-- Script -->
<script>
  function showMore() {
    const more = document.getElementById("moreProjects");
    const btn = document.getElementById("seeMoreBtn");

    if (more.classList.contains("hidden")) {
      more.classList.remove("hidden");
      btn.innerText = "See Less";
    } else {
      more.classList.add("hidden");
      btn.innerText = "See More";
    }
  }
</script>

</body>
</html>

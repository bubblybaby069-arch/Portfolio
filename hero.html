<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Divin Balethota | Full Stack Developer</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SEO -->
  <meta name="description" content="Divin Balethota – Full Stack Web Developer crafting seamless digital experiences using modern technologies." />
</head>

<body class="bg-black text-white font-sans antialiased selection:bg-yellow-400 selection:text-black">

  <!-- HERO SECTION -->
  <section
  id="hero"
  class="relative min-h-screen pt-24 md:pt-24 flex items-center justify-center overflow-hidden bg-[#020617]"
>

    <!-- Background Glow -->
    <div
      aria-hidden="true"
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-purple-900/20 rounded-full blur-[120px]"
    ></div>

    <div class="relative max-w-7xl mx-auto px-6 md:px-12 lg:px-20">
      <div class="grid lg:grid-cols-2 gap-12 items-center">

        <!-- TEXT CONTENT -->
        <div class="text-center lg:text-left order-2 lg:order-1">

          <p class="text-yellow-400 font-bold tracking-[0.3em] text-sm mb-4">
            HELLO!
          </p>

          <h1 class="text-5xl md:text-7xl font-black leading-tight mb-6">
            I'm
            <span class="bg-gradient-to-r from-yellow-400 via-orange-400 to-pink-500 bg-clip-text text-transparent">
              Divin
            </span>
            <br />
            Balethota
          </h1>

          <p class="text-gray-400 text-lg md:text-xl font-light mb-8 max-w-lg mx-auto lg:mx-0">
            Full-stack web developer crafting seamless digital experiences with modern technologies.
          </p>

          <div class="flex flex-wrap justify-center lg:justify-start gap-4">
            <button
              class="bg-yellow-400 hover:bg-yellow-500 text-black font-bold px-8 py-3 rounded-full transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-yellow-400/20"
            >
              Hire Me
            </button>

            <button
              class="border border-gray-600 hover:border-white hover:bg-white/10 px-8 py-3 rounded-full transition-all"
            >
              My Works
            </button>
          </div>
        </div>

        <!-- IMAGE -->
        <div class="flex items-center justify-center lg:justify-end order-1 lg:order-2">
          <div class="relative group">

            <!-- Glow Ring -->
            <div
              aria-hidden="true"
              class="absolute -inset-1 rounded-full bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 blur-xl opacity-40 group-hover:opacity-70 transition duration-1000 group-hover:duration-200"
            ></div>

            <!-- Profile Image -->
            <div
              class="relative w-64 h-64 md:w-80 md:h-80 lg:w-[400px] lg:h-[400px] rounded-full overflow-hidden border border-white/10 shadow-2xl"
            >
              <img
                src="profile.jpeg"
                alt="Divin Balethota profile photo"
                loading="lazy"
                class="w-full h-full object-cover transition duration-500 group-hover:scale-110"
              />
            </div>

          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
